name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Run tests
        run: make test

      - name: Build release binaries
        run: make release

      - name: Verify all platform binaries exist
        run: |
          set -e
          missing=0
          for f in \
            eink-6color \
            eink-6color-arm64 \
            eink-6color-darwin-amd64 \
            eink-6color-darwin-arm64 \
            eink-6color-windows-amd64.exe \
            eink-6color-windows-arm64.exe; do
            if [ ! -f "build/$f" ]; then
              echo "MISSING: build/$f"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          ls -lh build/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/eink-6color*
          generate_release_notes: true
          fail_on_unmatched_files: true
